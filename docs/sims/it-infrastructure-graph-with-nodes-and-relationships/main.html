<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
  <title>IT Infrastructure Graph</title>
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; color: #212529; }
    #outer { max-width: 960px; margin: 0 auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
    h1 { font-size: 18px; color: #1a3a6c; text-align: center; }
    #toolbar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    #search { flex: 1; min-width: 160px; padding: 6px 10px; border: 1px solid #dee2e6; border-radius: 6px; font-size: 13px; }
    #btn-fit { padding: 6px 14px; border: none; border-radius: 6px; background: #1a3a6c; color: #fff; font-size: 12px; font-weight: 600; cursor: pointer; }
    #layout { display: flex; gap: 10px; }
    #infra-net { flex: 1; height: 490px; border: 1px solid #dee2e6; border-radius: 8px; background: #fff; }
    #sidebar { width: 190px; display: flex; flex-direction: column; gap: 8px; }
    .card { background: #fff; border: 1px solid #dee2e6; border-radius: 8px; padding: 10px; }
    .card h3 { font-size: 11px; font-weight: 700; text-transform: uppercase; color: #495057; margin-bottom: 8px; }
    #legend { display: flex; flex-direction: column; gap: 6px; }
    #info { font-size: 12px; color: #333; min-height: 60px; }
  </style>
</head>
<body>
  <div id="outer">
    <h1>IT Infrastructure Graph</h1>
    <div id="toolbar">
      <input type="text" id="search" placeholder="Search nodes...">
      <button id="btn-fit">Fit All</button>
    </div>
    <div id="layout">
      <div id="infra-net"></div>
      <div id="sidebar">
        <div class="card">
          <h3>Filter Types</h3>
          <div id="legend"></div>
        </div>
        <div class="card">
          <h3>Details</h3>
          <div id="info">Click a node to highlight its relationships.</div>
        </div>
      </div>
    </div>
  </div>
  <script src="it-infrastructure-graph-with-nodes-and-relationships.js"></script>
</body>
</html>
