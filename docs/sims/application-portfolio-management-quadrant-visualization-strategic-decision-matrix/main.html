<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
    <title>Application Portfolio Management Quadrant</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="application-portfolio-management-quadrant-visualization-strategic-decision-matrix.js"></script>
    <style>
        body { margin: 0; padding: 10px; font-family: 'Segoe UI', sans-serif; background: #f8f9fa; }
        h2 { text-align: center; color: #1a3a6c; margin: 0 0 4px 0; font-size: 17px; }
        p.subtitle { text-align: center; color: #666; font-size: 12px; margin: 0 0 8px 0; }
        #controls { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 8px; font-size: 12px; }
        #controls label { background: #fff; border: 1px solid #ccc; border-radius: 4px; padding: 3px 8px; cursor: pointer; }
        #chartWrapper { position: relative; width: 100%; max-width: 680px; margin: 0 auto; }
        #myChart { background: white; border-radius: 8px; border: 1px solid #dee2e6; }
        #tooltip { position: fixed; background: white; border: 1px solid #ccc; border-radius: 6px;
            padding: 8px 12px; font-size: 12px; pointer-events: none; display: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15); z-index: 999; max-width: 220px; }
        #legend { display: flex; gap: 16px; justify-content: center; margin-top: 8px; font-size: 12px; flex-wrap: wrap; }
        .leg-item { display: flex; align-items: center; gap: 5px; }
        .leg-dot { width: 14px; height: 14px; border-radius: 50%; display: inline-block; }
    </style>
</head>
<body>
    <h2>Application Portfolio Management Quadrant</h2>
    <p class="subtitle">Strategic Value vs. Technical Quality — bubble size = annual cost</p>
    <div id="controls">
        <label><input type="checkbox" id="showINVEST" checked> INVEST</label>
        <label><input type="checkbox" id="showMIGRATE" checked> MIGRATE</label>
        <label><input type="checkbox" id="showTOLERATE" checked> TOLERATE</label>
        <label><input type="checkbox" id="showRETIRE" checked> RETIRE</label>
    </div>
    <main>
        <div id="chartWrapper">
            <canvas id="myChart" height="460"></canvas>
        </div>
    </main>
    <div id="tooltip"></div>
    <div id="legend">
        <span class="leg-item"><span class="leg-dot" style="background:#4CAF50"></span>Low complexity (0–10 connections)</span>
        <span class="leg-item"><span class="leg-dot" style="background:#FF9800"></span>Medium (11–20)</span>
        <span class="leg-item"><span class="leg-dot" style="background:#F44336"></span>High (21+)</span>
        <span class="leg-item">⬤ size = annual cost</span>
    </div>
</body>
</html>
