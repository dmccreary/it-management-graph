<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
    <title>Multi-Layer Dependency Map Visualization</title>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f8f9fa; }
        #container { width: 100%; max-width: 900px; margin: 0 auto; padding: 10px; background: white; }
        h1 { font-size: 17px; color: #1a3a6c; text-align: center; margin-bottom: 6px; }
        #layout { display: flex; gap: 10px; }
        #network { flex: 1; height: 500px; border: 1px solid #dee2e6; border-radius: 8px; background: #fff; }
        #sidebar { width: 190px; display: flex; flex-direction: column; gap: 8px; font-size: 12px; }
        .ctrl-group { background: #f1f3f5; border-radius: 8px; padding: 8px; }
        .ctrl-group h3 { font-size: 12px; font-weight: 700; margin-bottom: 6px; color: #1a3a6c; }
        .layer-toggle { display: flex; align-items: center; gap: 6px; padding: 3px 0; cursor: pointer; }
        .layer-dot { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
        label { cursor: pointer; font-size: 12px; }
        button { width: 100%; padding: 5px; border-radius: 6px; border: none; font-size: 12px; cursor: pointer; font-weight: 600; margin-top: 3px; }
        .btn-primary { background: #1a3a6c; color: #fff; }
        .btn-secondary { background: #6c757d; color: #fff; }
        #info-panel { background: #f1f3f5; border-radius: 8px; padding: 8px; font-size: 11px; flex: 1; }
        #info-panel h3 { font-size: 12px; margin-bottom: 4px; color: #1a3a6c; }
        #stats-panel { background: #e8f5e9; border-radius: 8px; padding: 8px; font-size: 11px; margin-top: 6px; }
    </style>
</head>
<body>
    <div id="container">
        <h1>Multi-Layer IT Dependency Map</h1>
        <div id="layout">
            <div id="network"></div>
            <div id="sidebar">
                <div class="ctrl-group">
                    <h3>Layer Visibility</h3>
                    <div class="layer-toggle"><input type="checkbox" id="l1" checked><div class="layer-dot" style="background:#E91E63"></div><label for="l1">Business Services</label></div>
                    <div class="layer-toggle"><input type="checkbox" id="l2" checked><div class="layer-dot" style="background:#9C27B0"></div><label for="l2">Technical Services</label></div>
                    <div class="layer-toggle"><input type="checkbox" id="l3" checked><div class="layer-dot" style="background:#2196F3"></div><label for="l3">Applications</label></div>
                    <div class="layer-toggle"><input type="checkbox" id="l4" checked><div class="layer-dot" style="background:#FF9800"></div><label for="l4">Databases</label></div>
                    <div class="layer-toggle"><input type="checkbox" id="l5" checked><div class="layer-dot" style="background:#607D8B"></div><label for="l5">Servers</label></div>
                    <div class="layer-toggle"><input type="checkbox" id="l6" checked><div class="layer-dot" style="background:#4CAF50"></div><label for="l6">Datacenters</label></div>
                    <button class="btn-secondary" id="reset-btn">↺ Reset Selection</button>
                </div>
                <div id="info-panel">
                    <h3>Node Info</h3>
                    <p id="node-info">Click a node to see details and highlight its dependency stack.</p>
                </div>
                <div id="stats-panel">
                    <strong>Graph Stats</strong><br>
                    Nodes: <span id="s-nodes">30</span> |
                    Edges: <span id="s-edges">—</span><br>
                    Layers: Business→DC (6 layers)
                </div>
            </div>
        </div>
    </div>
    <script src="multi-layer-dependency-map-visualization.js"></script>
</body>
</html>
