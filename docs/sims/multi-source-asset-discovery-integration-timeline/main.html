<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
    <title>Multi-Source Asset Discovery Integration Timeline</title>
    <script src="https://unpkg.com/vis-timeline/standalone/umd/vis-timeline-graph2d.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/vis-timeline/styles/vis-timeline-graph2d.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f8f9fa; }
        #container { width: 100%; max-width: 900px; margin: 0 auto; padding: 10px; background: white; }
        h1 { font-size: 17px; color: #1a3a6c; text-align: center; margin-bottom: 6px; }
        #timeline { width: 100%; height: 420px; border: 1px solid #dee2e6; border-radius: 8px; background: white; }
        #info-panel {
            margin-top: 10px;
            padding: 10px 14px;
            background: #f1f3f5;
            border-radius: 8px;
            font-size: 13px;
            min-height: 50px;
            border-left: 4px solid #1a3a6c;
        }
        #info-panel h3 { font-size: 14px; margin-bottom: 4px; color: #1a3a6c; }
        .legend { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 8px; font-size: 11px; }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .legend-dot { width: 12px; height: 12px; border-radius: 3px; }
        .vis-item.red { background: #ef5350 !important; border-color: #b71c1c !important; }
        .vis-item.orange { background: #FF9800 !important; border-color: #E65100 !important; }
        .vis-item.gold { background: #FFC107 !important; border-color: #FF8F00 !important; }
        .vis-item.green { background: #4CAF50 !important; border-color: #1B5E20 !important; }
        .vis-item .vis-item-content { color: #fff; font-size: 11px; font-weight: 600; padding: 2px 6px; }
        .vis-item.gold .vis-item-content { color: #333; }
    </style>
</head>
<body>
    <div id="container">
        <h1>Evolution of IT Asset Discovery Techniques (1990–2025)</h1>
        <div id="timeline"></div>
        <div id="info-panel">
            <h3>Click any event to see details</h3>
            <p>Hover or click on events to explore each era of IT asset discovery.</p>
        </div>
        <div class="legend">
            <div class="legend-item"><div class="legend-dot" style="background:#ef5350"></div>Manual Era (1990-2000)</div>
            <div class="legend-item"><div class="legend-dot" style="background:#FF9800"></div>Network Discovery (2000-2010)</div>
            <div class="legend-item"><div class="legend-dot" style="background:#FFC107"></div>Cloud Integration (2010-2018)</div>
            <div class="legend-item"><div class="legend-dot" style="background:#4CAF50"></div>Observability & Graph (2018-2025)</div>
        </div>
    </div>
    <script src="multi-source-asset-discovery-integration-timeline.js"></script>
</body>
</html>
