<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
  <title>IT Infrastructure Nodes Interactive Visualization</title>
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; color: #212529; }
    #outer { max-width: 960px; margin: 0 auto; padding: 10px; }
    h1 { font-size: 18px; color: #1a3a6c; text-align: center; margin-bottom: 8px; }
    #layout { display: flex; gap: 10px; }
    #nodes-net { flex: 1; height: 500px; border: 1px solid #dee2e6; border-radius: 8px; background: #fff; }
    #sidebar { width: 240px; display: flex; flex-direction: column; gap: 8px; }
    .card { background: #fff; border: 1px solid #dee2e6; border-radius: 8px; padding: 10px; }
    .card h3 { font-size: 11px; font-weight: 700; text-transform: uppercase; color: #495057; margin-bottom: 8px; letter-spacing: .4px; }
    #type-legend { display: flex; flex-direction: column; gap: 6px; }
    #prop-panel { font-size: 12px; }
    .prop-row { display: flex; justify-content: space-between; gap: 6px; padding: 3px 0; border-bottom: 1px solid #f0f0f0; }
    .prop-key { color: #6c757d; font-family: monospace; font-size: 11px; }
    .prop-val { color: #1a3a6c; font-weight: 600; font-size: 11px; text-align: right; }
    .cypher-box { background: #1e1e2e; color: #cdd6f4; font-family: monospace; font-size: 10px; padding: 8px; border-radius: 5px; word-break: break-all; line-height: 1.5; margin-top: 6px; }
  </style>
</head>
<body>
  <div id="outer">
    <h1>IT Infrastructure Node Types</h1>
    <div id="layout">
      <div id="nodes-net"></div>
      <div id="sidebar">
        <div class="card">
          <h3>Node Types</h3>
          <div id="type-legend"></div>
        </div>
        <div class="card">
          <h3>Node Properties</h3>
          <div id="prop-panel"><span style="color:#888;font-size:12px">Click any node to explore its properties and Cypher CREATE statement.</span></div>
        </div>
      </div>
    </div>
  </div>
  <script src="it-infrastructure-nodes-interactive-visualization.js"></script>
</body>
</html>
