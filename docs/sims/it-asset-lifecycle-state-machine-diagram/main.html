<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
  <title>IT Asset Lifecycle State Machine</title>
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; color: #212529; }
    #outer { max-width: 960px; margin: 0 auto; padding: 10px; }
    h1 { font-size: 18px; color: #1a3a6c; text-align: center; margin-bottom: 6px; }
    #state-net { width: 100%; height: 480px; border: 1px solid #dee2e6; border-radius: 8px; background: #fff; }
    #state-info { margin-top: 8px; padding: 10px 14px; background: #fff; border-left: 4px solid #1a3a6c; border-radius: 6px; font-size: 13px; min-height: 40px; }
    #controls { display: flex; justify-content: flex-end; margin-bottom: 6px; }
    button { padding: 6px 16px; border: none; border-radius: 6px; background: #1a3a6c; color: #fff; font-size: 12px; font-weight: 600; cursor: pointer; }
    .legend { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 8px; font-size: 11px; }
    .l-item { display: flex; align-items: center; gap: 4px; }
    .l-dot { width: 12px; height: 12px; border-radius: 2px; }
  </style>
</head>
<body>
  <div id="outer">
    <h1>IT Asset Lifecycle State Machine</h1>
    <div id="controls"><button id="btn-reset-view">Fit View</button></div>
    <div id="state-net"></div>
    <div id="state-info">Click a state to see details and highlight transitions.</div>
    <div class="legend">
      <div class="l-item"><div class="l-dot" style="background:#e2cfff;border:2px solid #6f42c1"></div>Requested</div>
      <div class="l-item"><div class="l-dot" style="background:#cfe2ff;border:2px solid #0d6efd"></div>Ordered</div>
      <div class="l-item"><div class="l-dot" style="background:#d1e7dd;border:2px solid #198754"></div>Received</div>
      <div class="l-item"><div class="l-dot" style="background:#28a745;border:2px solid #155724"></div>Deployed</div>
      <div class="l-item"><div class="l-dot" style="background:#0d6efd;border:2px solid #0a3678"></div>In Service</div>
      <div class="l-item"><div class="l-dot" style="background:#fd7e14;border:2px solid #7a3500"></div>Maintenance</div>
      <div class="l-item"><div class="l-dot" style="background:#dc3545;border:2px solid #7b1c1c"></div>Retired</div>
      <div class="l-item"><div class="l-dot" style="background:#6c757d;border:2px solid #343a40"></div>Disposed</div>
    </div>
  </div>
  <script src="it-asset-lifecycle-state-machine-diagram.js"></script>
</body>
</html>
