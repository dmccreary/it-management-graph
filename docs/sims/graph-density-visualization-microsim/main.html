<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
  <title>Graph Density Visualization</title>
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; color: #212529; }
    #wrapper { display: flex; max-width: 960px; margin: 0 auto; padding: 10px; gap: 12px; }
    #graph-container { flex: 1; height: 600px; border: 1px solid #dee2e6; border-radius: 8px; background: #fff; }
    #controls { width: 280px; display: flex; flex-direction: column; gap: 10px; }
    h1 { font-size: 18px; color: #1a3a6c; text-align: center; margin-bottom: 6px; }
    .card { background: #fff; border: 1px solid #dee2e6; border-radius: 8px; padding: 12px; }
    .card h3 { font-size: 13px; font-weight: 700; color: #495057; margin-bottom: 8px; text-transform: uppercase; letter-spacing: .5px; }
    label { font-size: 12px; color: #495057; display: flex; justify-content: space-between; margin-bottom: 2px; }
    input[type=range] { width: 100%; margin-bottom: 8px; accent-color: #1a3a6c; }
    .density-row { display: flex; align-items: center; gap: 6px; }
    #density-indicator { width: 14px; height: 14px; border-radius: 50%; background: #28a745; transition: background .3s; flex-shrink: 0; }
    #density-warn { display: none; font-size: 11px; color: #dc3545; margin-top: 2px; }
    button { width: 100%; padding: 8px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; margin-bottom: 4px; }
    #btn-generate { background: #1a3a6c; color: #fff; }
    #btn-traverse { background: #28a745; color: #fff; }
    #btn-reset { background: #fd7e14; color: #fff; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    .stat-row { display: flex; justify-content: space-between; font-size: 12px; margin: 3px 0; }
    .stat-label { color: #6c757d; }
    .stat-value { font-weight: 700; color: #1a3a6c; }
    #status-msg { font-size: 11px; color: #495057; margin-top: 4px; font-style: italic; min-height: 32px; }
    .legend { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
    .legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; }
    .legend-dot { width: 12px; height: 12px; border-radius: 50%; }
  </style>
</head>
<body>
  <div id="wrapper">
    <div id="graph-container"></div>
    <div id="controls">
      <h1>Graph Density</h1>
      <div class="card">
        <h3>Parameters</h3>
        <label>Nodes <span id="nodes-val">30</span></label>
        <input type="range" id="slider-nodes" min="10" max="60" value="30" step="5">
        <label>Density <span class="density-row"><span id="density-val">5%</span><span id="density-indicator"></span></span></label>
        <input type="range" id="slider-density" min="1" max="50" value="5" step="1">
        <div id="density-warn">⚠ High density—unusual in real IT graphs!</div>
        <label>Anim Speed <span id="speed-val">600ms</span></label>
        <input type="range" id="slider-speed" min="100" max="2000" value="600" step="100">
      </div>
      <div class="card">
        <button id="btn-generate">Generate Graph</button>
        <button id="btn-traverse" disabled>Start BFS Traversal</button>
        <button id="btn-reset" disabled>Reset Colors</button>
        <div id="status-msg">Adjust sliders and click Generate Graph.</div>
      </div>
      <div class="card">
        <h3>Statistics</h3>
        <div class="stat-row"><span class="stat-label">Total Nodes</span><span class="stat-value" id="stat-nodes">—</span></div>
        <div class="stat-row"><span class="stat-label">Total Edges</span><span class="stat-value" id="stat-edges">—</span></div>
        <div class="stat-row"><span class="stat-label">Actual Density</span><span class="stat-value" id="stat-density">—</span></div>
        <div class="stat-row"><span class="stat-label">Max Possible Edges</span><span class="stat-value" id="stat-max-edges">—</span></div>
        <div class="stat-row"><span class="stat-label">Avg Node Degree</span><span class="stat-value" id="stat-avg-degree">—</span></div>
        <div class="stat-row"><span class="stat-label">Reachable from Start</span><span class="stat-value" id="stat-reachable">—</span></div>
      </div>
      <div class="card">
        <h3>Legend</h3>
        <div class="legend">
          <div class="legend-item"><div class="legend-dot" style="background:#28a745"></div> Start</div>
          <div class="legend-item"><div class="legend-dot" style="background:#90ee90"></div> Hop 1</div>
          <div class="legend-item"><div class="legend-dot" style="background:#ffc107"></div> Hop 2</div>
          <div class="legend-item"><div class="legend-dot" style="background:#fd7e14"></div> Hop 3+</div>
          <div class="legend-item"><div class="legend-dot" style="background:#adb5bd"></div> Unvisited</div>
        </div>
      </div>
    </div>
  </div>
  <script src="graph-density-visualization-microsim.js"></script>
</body>
</html>
