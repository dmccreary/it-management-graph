<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
    <title>AI-Enhanced IT Management Graph Architecture</title>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <script src="ai-enhanced-it-management-graph-architecture-diagram.js"></script>
    <style>
        body { margin: 0; padding: 10px; font-family: 'Segoe UI', sans-serif; background: #f8f9fa; }
        h2 { text-align: center; color: #1a3a6c; margin: 0 0 6px 0; font-size: 18px; }
        p.subtitle { text-align: center; color: #555; font-size: 13px; margin: 0 0 8px 0; }
        #diagram { width: 100%; height: 580px; border: 1px solid #dee2e6; border-radius: 8px; background: #fff; }
        #legend { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-top: 8px; font-size: 12px; }
        .leg { display: flex; align-items: center; gap: 5px; }
        .leg-line { width: 32px; height: 3px; display: inline-block; }
        .dashed { background: none; border-top: 2px dashed; }
    </style>
</head>
<body>
    <h2>AI-Enhanced IT Management Graph Architecture</h2>
    <p class="subtitle">How AI/ML components integrate with the core IT management graph</p>
    <main>
        <div id="diagram"></div>
    </main>
    <div id="legend">
        <span class="leg"><span class="leg-line" style="background:#2196F3"></span>Data ingestion</span>
        <span class="leg"><span class="leg-line" style="background:#FFD700"></span>Graph queries</span>
        <span class="leg"><span class="leg-line dashed" style="border-color:#9C27B0"></span>ML training</span>
        <span class="leg"><span class="leg-line" style="background:#4CAF50"></span>AI insights</span>
        <span class="leg"><span class="leg-line" style="background:#FF9800"></span>Feedback loop</span>
    </div>
</body>
</html>
