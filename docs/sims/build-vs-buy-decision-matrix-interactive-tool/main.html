<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
    <title>Build vs Buy Decision Matrix</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="build-vs-buy-decision-matrix-interactive-tool.js"></script>
    <style>
        body { margin: 0; padding: 10px; font-family: 'Segoe UI', sans-serif; background: #f8f9fa; }
        h2 { text-align: center; color: #1a3a6c; margin: 0 0 4px 0; font-size: 17px; }
        #layout { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
        #chartBox { flex: 1; min-width: 300px; max-width: 480px; }
        #controls { flex: 0 0 260px; background: white; border: 1px solid #dee2e6; border-radius: 8px; padding: 12px; }
        #controls h3 { margin: 0 0 8px 0; font-size: 13px; color: #333; }
        .slider-row { margin-bottom: 8px; }
        .slider-row label { display: flex; justify-content: space-between; font-size: 11px; color: #555; margin-bottom: 2px; }
        .slider-row input { width: 100%; }
        #recommendation { margin-top: 12px; padding: 10px; border-radius: 6px; text-align: center; font-weight: bold; font-size: 15px; }
    </style>
</head>
<body>
    <h2>Build vs Buy Decision Matrix</h2>
    <div id="layout">
        <div id="chartBox"><canvas id="radarChart"></canvas></div>
        <div id="controls">
            <h3>Adjust Your Organization's Profile</h3>
            <div id="sliders"></div>
            <div id="recommendation">Calculating…</div>
        </div>
    </div>
    <main></main>
</body>
</html>
