<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
    <title>Dynamic Topology Update Timeline</title>
    <link rel="stylesheet" href="https://unpkg.com/vis-timeline/styles/vis-timeline-graph2d.min.css">
    <script src="https://unpkg.com/vis-timeline/standalone/umd/vis-timeline-graph2d.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; }
        #container { width: 100%; max-width: 1000px; margin: 0 auto; padding: 16px; }
        h1 { font-size: 18px; color: #1a3a6c; margin-bottom: 4px; text-align: center; }
        .subtitle { text-align: center; font-size: 12px; color: #666; margin-bottom: 12px; }
        #timeline { background: white; border: 1px solid #dee2e6; border-radius: 8px; margin-bottom: 12px; }
        .info-panel { background: white; border: 1px solid #dee2e6; border-radius: 8px; padding: 14px; min-height: 80px; }
        .info-panel h3 { font-size: 13px; color: #1a3a6c; margin-bottom: 6px; }
        #event-detail { font-size: 12px; color: #444; }
        .legend { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 8px; }
        .leg-item { display: flex; align-items: center; gap: 5px; font-size: 11px; }
        .leg-dot { width: 14px; height: 14px; border-radius: 3px; }
        .vis-item.infra-event  { background: #1976d2; border-color: #0d47a1; color: white; }
        .vis-item.discovery    { background: #f9a825; border-color: #e65100; color: #333; }
        .vis-item.graph-update { background: #e91e63; border-color: #880e4f; color: white; }
        .vis-item.graph-state  { background: #43a047; border-color: #1b5e20; color: white; }
        .vis-item.vis-selected { border-width: 3px !important; }
    </style>
</head>
<body>
<div id="container">
    <h1>Dynamic Topology Discovery in Action</h1>
    <p class="subtitle">Automated IT Management Graph Updates Over 10 Minutes — click any event for details</p>
    <div id="timeline"></div>
    <div class="info-panel">
        <h3>Event Details</h3>
        <div id="event-detail">Click any timeline event to see detailed information about that topology change.</div>
        <div class="legend">
            <div class="leg-item"><div class="leg-dot" style="background:#1976d2"></div>Infrastructure Event</div>
            <div class="leg-item"><div class="leg-dot" style="background:#f9a825"></div>Discovery Action</div>
            <div class="leg-item"><div class="leg-dot" style="background:#e91e63"></div>Graph Update</div>
            <div class="leg-item"><div class="leg-dot" style="background:#43a047"></div>Graph State Snapshot</div>
        </div>
    </div>
</div>
<script src="dynamic-topology-update-timeline-visualization.js"></script>
</body>
</html>
