<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
    <title>GDPR Cross-Border Data Flow Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; }
        #container { width: 100%; max-width: 1000px; margin: 0 auto; padding: 10px; }
        h1 { font-size: 18px; color: #1a3a6c; margin-bottom: 4px; }
        .subtitle { font-size: 12px; color: #666; margin-bottom: 10px; }
        #map { height: 440px; border-radius: 8px; border: 1px solid #dee2e6; }
        .controls { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
        button { padding: 6px 12px; border: none; border-radius: 4px; font-size: 12px; cursor: pointer; font-weight: 600; }
        .btn-all  { background: #1a3a6c; color: white; }
        .btn-restricted { background: #e53935; color: white; }
        .btn-adequacy   { background: #f9a825; color: #333; }
        .legend { background: white; border: 1px solid #dee2e6; border-radius: 8px; padding: 10px; margin-top: 8px; display: flex; flex-wrap: wrap; gap: 12px; }
        .leg-item { display: flex; align-items: center; gap: 6px; font-size: 11px; }
        .leg-line { width: 30px; height: 4px; border-radius: 2px; }
        .flow-tooltip { font-size: 12px; line-height: 1.5; }
        .dc-popup { font-size: 12px; }
        .dc-popup b { color: #1a3a6c; }
    </style>
</head>
<body>
<div id="container">
    <h1>GDPR Cross-Border Data Flow Map</h1>
    <p class="subtitle">Data transfers subject to GDPR restrictions — hover flows for legal basis, click data centers for details</p>
    <div class="controls">
        <button class="btn-all" onclick="showAllFlows()">Show All Flows</button>
        <button class="btn-restricted" onclick="showRestrictedOnly()">Restricted Only</button>
        <button class="btn-adequacy" onclick="showAdequacyOnly()">Adequacy Decisions</button>
    </div>
    <div id="map"></div>
    <div class="legend">
        <div class="leg-item"><div class="leg-line" style="background:#43a047"></div>EU Internal — Unrestricted</div>
        <div class="leg-item"><div class="leg-line" style="background:#f9a825"></div>Adequacy Decision (no extra safeguards)</div>
        <div class="leg-item"><div class="leg-line" style="background:#e67e22;border: 2px dashed #e67e22;height:0"></div>SCCs Required (Standard Contractual Clauses)</div>
        <div class="leg-item"><div class="leg-line" style="background:#e53935;border: 2px dashed #e53935;height:0"></div>High-Risk — BCR/SCC Required</div>
    </div>
</div>
<script src="gdpr-cross-border-data-flow-map.js"></script>
</body>
</html>
