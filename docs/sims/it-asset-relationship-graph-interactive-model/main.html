<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
  <title>IT Asset Relationship Graph</title>
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; color: #212529; }
    #outer { max-width: 960px; margin: 0 auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
    h1 { font-size: 18px; color: #1a3a6c; text-align: center; }
    #layout { display: flex; gap: 10px; }
    #rel-net { flex: 1; height: 480px; border: 1px solid #dee2e6; border-radius: 8px; background: #fff; }
    #sidebar { width: 200px; display: flex; flex-direction: column; gap: 8px; }
    .card { background: #fff; border: 1px solid #dee2e6; border-radius: 8px; padding: 10px; }
    .card h3 { font-size: 12px; font-weight: 700; text-transform: uppercase; color: #495057; margin-bottom: 8px; }
    #filters { display: flex; flex-direction: column; gap: 6px; }
    #detail { font-size: 12px; color: #333; min-height: 60px; }
  </style>
</head>
<body>
  <div id="outer">
    <h1>IT Asset Relationship Graph</h1>
    <div id="layout">
      <div id="rel-net"></div>
      <div id="sidebar">
        <div class="card">
          <h3>Filter by Type</h3>
          <div id="filters"></div>
        </div>
        <div class="card">
          <h3>Details</h3>
          <div id="detail">Click a node to see details and highlight relationships.</div>
        </div>
      </div>
    </div>
  </div>
  <script src="it-asset-relationship-graph-interactive-model.js"></script>
</body>
</html>
