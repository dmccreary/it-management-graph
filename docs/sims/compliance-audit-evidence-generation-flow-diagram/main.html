<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
    <title>Compliance Audit Evidence Generation Flow</title>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script src="compliance-audit-evidence-generation-flow-diagram.js"></script>
    <style>
        body { margin: 0; padding: 10px; font-family: 'Segoe UI', sans-serif; background: #f8f9fa; }
        h2 { text-align: center; color: #1a3a6c; margin: 0 0 4px 0; font-size: 17px; }
        p.subtitle { text-align: center; color: #555; font-size: 12px; margin: 0 0 8px 0; }
        #controls { display: flex; gap: 8px; justify-content: center; margin-bottom: 8px; flex-wrap: wrap; }
        button { padding: 4px 12px; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; background: white; font-size: 12px; }
        button.active { background: #1a3a6c; color: white; }
        #diagram-container { background: white; border: 1px solid #dee2e6; border-radius: 8px; padding: 16px; overflow: auto; }
        .mermaid { text-align: center; }
    </style>
</head>
<body>
    <h2>Compliance Audit Evidence Generation Flow</h2>
    <p class="subtitle">Automated evidence collection pipeline from IT management graph to audit reports</p>
    <div id="controls">
        <button id="btnOverview" class="active">Overview Flow</button>
        <button id="btnSOX">SOX Controls</button>
        <button id="btnHIPAA">HIPAA Evidence</button>
    </div>
    <main>
        <div id="diagram-container">
            <div class="mermaid" id="mermaid-div"></div>
        </div>
    </main>
</body>
</html>
