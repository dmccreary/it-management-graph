<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
    <title>Business Service Mapping</title>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <script src="business-service-mapping-visualization-end-to-end-dependencies.js"></script>
    <style>
        body { margin: 0; padding: 10px; font-family: 'Segoe UI', sans-serif; background: #f8f9fa; }
        h2 { text-align: center; color: #1a3a6c; margin: 0 0 4px 0; font-size: 17px; }
        p.subtitle { text-align: center; color: #555; font-size: 12px; margin: 0 0 6px 0; }
        #controls { display: flex; gap: 8px; justify-content: center; margin-bottom: 6px; flex-wrap: wrap; font-size: 12px; }
        button { padding: 4px 12px; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; background: white; font-size: 12px; }
        #diagram { width: 100%; height: 520px; border: 1px solid #dee2e6; border-radius: 8px; background: white; }
        #legend { display: flex; gap: 16px; justify-content: center; margin-top: 6px; font-size: 11px; flex-wrap: wrap; }
        .leg { display: flex; align-items: center; gap: 4px; }
        .leg-dot { width: 12px; height: 12px; border-radius: 50%; }
    </style>
</head>
<body>
    <h2>Business Service Mapping — End-to-End Dependencies</h2>
    <p class="subtitle">How business services depend on applications, databases, and infrastructure</p>
    <div id="controls">
        <button id="btnOnlineBanking">Online Banking</button>
        <button id="btnMobileApp">Mobile App</button>
        <button id="btnAllServices">All Services</button>
        <button id="btnFit">Fit to Screen</button>
    </div>
    <main><div id="diagram"></div></main>
    <div id="legend">
        <span class="leg"><span class="leg-dot" style="background:#F8BBD0"></span>Business Service</span>
        <span class="leg"><span class="leg-dot" style="background:#BBDEFB"></span>Application</span>
        <span class="leg"><span class="leg-dot" style="background:#FFE0B2"></span>Database</span>
        <span class="leg"><span class="leg-dot" style="background:#E0E0E0"></span>Server/Infra</span>
    </div>
</body>
</html>
