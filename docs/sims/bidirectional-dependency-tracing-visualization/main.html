<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
    <title>Bidirectional Dependency Tracing</title>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <script src="bidirectional-dependency-tracing-visualization.js"></script>
    <style>
        body { margin: 0; padding: 10px; font-family: 'Segoe UI', sans-serif; background: #f8f9fa; }
        h2 { text-align: center; color: #1a3a6c; margin: 0 0 4px 0; font-size: 17px; }
        #controls { display: flex; gap: 8px; justify-content: center; margin-bottom: 6px; flex-wrap: wrap; }
        button { padding: 5px 14px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; }
        #diagram { width: 100%; height: 520px; border: 1px solid #dee2e6; border-radius: 8px; background: white; }
        #info { text-align: center; font-size: 12px; color: #555; margin-top: 4px; }
    </style>
</head>
<body>
    <h2>Bidirectional Dependency Tracing — Customer Portal</h2>
    <div id="controls">
        <button id="btnAll"       style="background:#e9ecef">Show All</button>
        <button id="btnUpstream"  style="background:#c8e6c9">↑ Upstream (what I need)</button>
        <button id="btnDownstream"style="background:#bbdefb">↓ Downstream (who needs me)</button>
        <button id="btnReset"     style="background:#fff3cd">Reset Layout</button>
    </div>
    <main>
        <div id="diagram"></div>
    </main>
    <div id="info">Click a node to highlight its connections. Use buttons to filter by direction.</div>
</body>
</html>
