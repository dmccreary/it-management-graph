<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
  <title>HIPAA Data Flow Tracing Diagram</title>
  <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; color: #212529; }
    #outer { max-width: 960px; margin: 0 auto; padding: 10px; }
    h1 { font-size: 18px; color: #1a3a6c; text-align: center; margin-bottom: 8px; }
    #controls { display: flex; gap: 10px; justify-content: center; margin-bottom: 10px; }
    button { padding: 8px 20px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; transition: background .2s; }
    #mermaid-container { background: #fff; border: 1px solid #dee2e6; border-radius: 8px; padding: 20px; min-height: 480px; overflow: auto; }
    #mermaid-container svg { width: 100%; height: auto; }
    .legend { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-top: 10px; font-size: 12px; }
    .legend-item { display: flex; align-items: center; gap: 5px; }
    .legend-dot { width: 14px; height: 14px; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="outer">
    <h1>HIPAA Data Flow Tracing Diagram</h1>
    <div id="controls">
      <button id="btn-dataflow">ePHI Data Flow</button>
      <button id="btn-access">Access Control</button>
    </div>
    <div id="mermaid-container">Loading diagram...</div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#fde8e8;border:2px solid #dc3545"></div>ePHI Systems</div>
      <div class="legend-item"><div class="legend-dot" style="background:#cfe2ff;border:2px solid #0d6efd"></div>IT Systems</div>
      <div class="legend-item"><div class="legend-dot" style="background:#d1e7dd;border:2px solid #198754"></div>HIPAA Controls</div>
      <div class="legend-item"><div class="legend-dot" style="background:#fff3cd;border:2px solid #ffc107"></div>External Parties</div>
      <div class="legend-item"><div class="legend-dot" style="background:#e2cfff;border:2px solid #6f42c1"></div>User Roles</div>
    </div>
  </div>
  <script src="hipaa-data-flow-tracing-diagram.js"></script>
</body>
</html>
