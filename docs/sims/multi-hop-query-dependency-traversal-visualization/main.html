<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
    <title>Multi-Hop Query Dependency Traversal Visualization</title>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f8f9fa; }
        #container { width: 100%; max-width: 900px; margin: 0 auto; padding: 10px; background: white; }
        h1 { font-size: 18px; color: #1a3a6c; text-align: center; margin-bottom: 6px; }
        #layout { display: flex; gap: 10px; }
        #network { flex: 1; height: 480px; border: 1px solid #dee2e6; border-radius: 8px; background: #fff; }
        #controls {
            width: 230px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            font-size: 13px;
        }
        .ctrl-group { background: #f1f3f5; border-radius: 8px; padding: 10px; }
        .ctrl-group label { font-weight: 600; display: block; margin-bottom: 4px; color: #1a3a6c; }
        select, button { width: 100%; padding: 6px; border-radius: 6px; border: 1px solid #adb5bd; font-size: 13px; cursor: pointer; }
        button { background: #1a3a6c; color: #fff; border: none; font-weight: 600; margin-top: 4px; }
        button:hover { background: #2756a0; }
        button.reset { background: #6c757d; }
        button.reset:hover { background: #495057; }
        #stats { background: #f1f3f5; border-radius: 8px; padding: 10px; font-size: 12px; }
        #stats h3 { font-size: 13px; margin-bottom: 6px; color: #1a3a6c; }
        .stat-row { display: flex; justify-content: space-between; padding: 2px 0; border-bottom: 1px solid #dee2e6; }
        #sql-box { background: #1e1e2e; color: #a8e6a3; font-family: monospace; font-size: 11px; padding: 8px; border-radius: 6px; white-space: pre-wrap; min-height: 80px; }
        #hop-legend { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; font-size: 11px; }
        .hop-badge { padding: 2px 8px; border-radius: 10px; color: #fff; font-weight: 600; }
    </style>
</head>
<body>
    <div id="container">
        <h1>Multi-Hop Query Dependency Traversal</h1>
        <div id="layout">
            <div id="network"></div>
            <div id="controls">
                <div class="ctrl-group">
                    <label>Root Application</label>
                    <select id="root-select">
                        <option value="customer_portal">Customer Portal</option>
                        <option value="api_gateway">API Gateway</option>
                        <option value="auth_service">Auth Service</option>
                        <option value="payment_service">Payment Service</option>
                    </select>
                    <label style="margin-top:8px">Hop Limit</label>
                    <input type="range" id="hop-slider" min="1" max="5" value="3" style="width:100%">
                    <div style="text-align:center;font-size:12px" id="hop-display">Hop limit: 3</div>
                    <button id="traverse-btn">▶ Traverse All Hops</button>
                    <button class="reset" id="reset-btn">↺ Reset</button>
                </div>
                <div id="stats">
                    <h3>Statistics</h3>
                    <div class="stat-row"><span>Current hop</span><span id="s-hop">—</span></div>
                    <div class="stat-row"><span>Apps discovered</span><span id="s-apps">0</span></div>
                    <div class="stat-row"><span>Intermediate rows</span><span id="s-rows">0</span></div>
                    <div class="stat-row"><span>Table JOINs needed</span><span id="s-joins">0</span></div>
                    <div class="stat-row"><span>Est. RDBMS time</span><span id="s-time">—</span></div>
                </div>
                <div class="ctrl-group">
                    <label>SQL Query (equivalent)</label>
                    <div id="sql-box">SELECT *\nFROM app a\n-- select root</div>
                </div>
                <div id="hop-legend">
                    <span class="hop-badge" style="background:#27ae60">Root</span>
                    <span class="hop-badge" style="background:#82c45b">Hop 1</span>
                    <span class="hop-badge" style="background:#f1c40f;color:#333">Hop 2</span>
                    <span class="hop-badge" style="background:#e67e22">Hop 3</span>
                    <span class="hop-badge" style="background:#e74c3c">Hop 4-5</span>
                    <span class="hop-badge" style="background:#bdc3c7;color:#333">Unvisited</span>
                </div>
            </div>
        </div>
    </div>
    <script src="multi-hop-query-dependency-traversal-visualization.js"></script>
</body>
</html>
