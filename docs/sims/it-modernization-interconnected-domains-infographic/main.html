<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
    <title>IT Modernization Interconnected Domains Infographic</title>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f8f9fa;
            color: #212529;
        }
        #container {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            padding: 10px;
            background: white;
        }
        h1 {
            font-size: 20px;
            margin-bottom: 6px;
            color: #1a3a6c;
            text-align: center;
        }
        #network {
            width: 100%;
            height: 560px;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            background: #fff;
        }
        #info-panel {
            margin-top: 10px;
            padding: 12px;
            background: #f1f3f5;
            border-radius: 8px;
            font-size: 14px;
            min-height: 60px;
            border-left: 4px solid #1a3a6c;
        }
        #info-panel h3 { font-size: 15px; margin-bottom: 4px; }
        #info-panel p { color: #495057; }
        .legend {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-top: 10px;
            font-size: 12px;
            align-items: center;
        }
        .legend-item { display: flex; align-items: center; gap: 6px; }
        .legend-dot {
            width: 14px; height: 14px; border-radius: 50%;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div id="container">
        <h1>IT Modernization Interconnected Domains</h1>
        <div id="network"></div>
        <div id="info-panel">
            <h3>Click or hover on any node to explore its details</h3>
            <p>The IT Management Graph sits at the center, integrating four modernization domains.</p>
        </div>
        <div class="legend">
            <div class="legend-item"><span class="legend-dot" style="background:#DAA520"></span>IT Management Graph (Center)</div>
            <div class="legend-item"><span class="legend-dot" style="background:#2196F3"></span>Infrastructure Modernization</div>
            <div class="legend-item"><span class="legend-dot" style="background:#4CAF50"></span>Data Modernization</div>
            <div class="legend-item"><span class="legend-dot" style="background:#FF9800"></span>Process Modernization</div>
            <div class="legend-item"><span class="legend-dot" style="background:#9C27B0"></span>Tooling Modernization</div>
        </div>
    </div>
    <script src="it-modernization-interconnected-domains-infographic.js"></script>
</body>
</html>
