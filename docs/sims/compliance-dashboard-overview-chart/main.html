<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
    <title>Compliance Dashboard Overview</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="compliance-dashboard-overview-chart.js"></script>
    <style>
        body { margin: 0; padding: 10px; font-family: 'Segoe UI', sans-serif; background: #f0f2f5; }
        h2 { text-align: center; color: #1a3a6c; margin: 0 0 8px 0; font-size: 17px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-width: 860px; margin: 0 auto; }
        .card { background: white; border-radius: 8px; padding: 12px; border: 1px solid #dee2e6; }
        .card h3 { margin: 0 0 8px 0; font-size: 12px; color: #555; text-align: center; }
        #scoreBox { text-align: center; font-size: 56px; font-weight: bold; padding: 20px 0; }
        .score-label { font-size: 12px; color: #777; margin-top: -8px; }
    </style>
</head>
<body>
    <h2>Compliance Dashboard — Executive Overview</h2>
    <main>
        <div class="grid">
            <div class="card">
                <h3>Overall Compliance Health Score</h3>
                <div id="scoreBox" style="color:#2E7D32">87</div>
                <div class="score-label" style="text-align:center">/ 100 — Green Zone</div>
                <canvas id="gaugeChart" height="120"></canvas>
            </div>
            <div class="card">
                <h3>Compliance Status by Regulation</h3>
                <canvas id="regulationChart" height="160"></canvas>
            </div>
            <div class="card">
                <h3>Control Effectiveness Over Time</h3>
                <canvas id="trendChart" height="160"></canvas>
            </div>
            <div class="card">
                <h3>Open Findings by Severity</h3>
                <canvas id="findingsChart" height="160"></canvas>
            </div>
        </div>
    </main>
</body>
</html>
