<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
  <title>Graph RAG Query Flow</title>
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; color: #212529; }
    #outer { max-width: 960px; margin: 0 auto; padding: 10px; }
    h1 { font-size: 18px; color: #1a3a6c; margin-bottom: 8px; text-align: center; }
    #rag-network { width: 100%; height: 440px; border: 1px solid #dee2e6; border-radius: 8px; background: #fff; }
    #detail-panel { margin-top: 8px; background: #fff; border-left: 4px solid #1a3a6c; border-radius: 6px; padding: 10px 14px; font-size: 13px; min-height: 52px; color: #333; }
    #controls { display: flex; align-items: center; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
    button { padding: 7px 18px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; }
    #btn-play  { background: #1a3a6c; color: #fff; }
    #btn-step  { background: #28a745; color: #fff; }
    #btn-reset { background: #6c757d; color: #fff; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    #step-counter { font-size: 13px; color: #495057; font-weight: 600; }
    #lane-legend { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 10px; }
  </style>
</head>
<body>
  <div id="outer">
    <h1>Graph RAG Query Flow</h1>
    <div id="rag-network"></div>
    <div id="detail-panel">Click a step box or use the controls below to walk through the Graph RAG pipeline.</div>
    <div id="controls">
      <button id="btn-play">&#9654; Play All Steps</button>
      <button id="btn-step">&#8594; Next Step</button>
      <button id="btn-reset">&#8635; Reset</button>
      <span id="step-counter">Step 0 of 10</span>
    </div>
    <div id="lane-legend"></div>
  </div>
  <script src="graph-rag-query-flow-interactive-diagram.js"></script>
</body>
</html>
