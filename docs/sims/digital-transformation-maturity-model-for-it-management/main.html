<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
    <title>Digital Transformation Maturity Model</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; }
        #container { width: 100%; max-width: 950px; margin: 0 auto; padding: 16px; }
        h1 { font-size: 18px; color: #1a3a6c; margin-bottom: 4px; text-align: center; }
        .subtitle { text-align: center; font-size: 12px; color: #666; margin-bottom: 14px; }
        .layout { display: flex; gap: 14px; align-items: flex-start; }
        #chart-wrap { flex: 1; background: white; border: 1px solid #dee2e6; border-radius: 8px; padding: 14px; }
        .controls { width: 270px; background: white; border: 1px solid #dee2e6; border-radius: 8px; padding: 14px; }
        .controls h3 { font-size: 13px; color: #1a3a6c; margin-bottom: 10px; }
        .dim-row { margin-bottom: 10px; }
        .dim-label { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 3px; }
        .dim-label .name { font-weight: 600; }
        .dim-label .level { font-weight: 700; color: #1a3a6c; }
        input[type=range] { width: 100%; cursor: pointer; }
        .level-badge { display: inline-block; font-size: 10px; padding: 2px 6px; border-radius: 10px; margin-top: 2px; }
        .summary-box { margin-top: 12px; padding: 10px; background: #f0f4ff; border-radius: 6px; }
        .summary-title { font-size: 12px; font-weight: 600; color: #1a3a6c; margin-bottom: 4px; }
        .summary-val { font-size: 26px; font-weight: 700; color: #1a3a6c; }
        .summary-sub { font-size: 11px; color: #666; }
    </style>
</head>
<body>
<div id="container">
    <h1>Digital Transformation Maturity Model for IT Management</h1>
    <p class="subtitle">Assess your organization across 6 dimensions — from manual tracking to AI-enhanced intelligence</p>
    <div class="layout">
        <div id="chart-wrap">
            <canvas id="maturity-chart"></canvas>
        </div>
        <div class="controls">
            <h3>Set Maturity Levels (1–5)</h3>
            <div id="sliders"></div>
            <div class="summary-box">
                <div class="summary-title">Overall Maturity</div>
                <div class="summary-val" id="overall-score">—</div>
                <div class="summary-sub" id="overall-label">Adjust sliders to assess</div>
            </div>
        </div>
    </div>
</div>
<script src="digital-transformation-maturity-model-for-it-management.js"></script>
</body>
</html>
