<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
  <title>IT Asset Hierarchy Infographic</title>
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; color: #212529; }
    #outer { max-width: 960px; margin: 0 auto; padding: 10px; }
    h1 { font-size: 18px; color: #1a3a6c; text-align: center; margin-bottom: 4px; }
    .subtitle { text-align: center; font-size: 12px; color: #6c757d; margin-bottom: 8px; }
    #tree-net { width: 100%; height: 500px; border: 1px solid #dee2e6; border-radius: 8px; background: #fff; }
    #legend { display: flex; flex-wrap: wrap; gap: 14px; justify-content: center; margin-top: 10px; }
  </style>
</head>
<body>
  <div id="outer">
    <h1>IT Asset Hierarchy</h1>
    <p class="subtitle">Click a category node (Hardware, Software, Cloud) to collapse or expand its children.</p>
    <div id="tree-net"></div>
    <div id="legend"></div>
  </div>
  <script src="it-asset-hierarchy-infographic.js"></script>
</body>
</html>
