<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
    <title>TCO Comparison Chart: Three Options Over Five Years</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { margin: 0; padding: 10px; background: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        h2 { font-size: 17px; color: #1a3a6c; margin: 0 0 4px 0; }
        .subtitle { font-size: 12px; color: #666; margin-bottom: 10px; }
        .controls { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; align-items: center; }
        .controls label { font-size: 13px; display: flex; align-items: center; gap: 5px; cursor: pointer; }
        .controls input[type=checkbox] { width: 16px; height: 16px; cursor: pointer; }
        .chart-container { position: relative; width: 100%; height: 440px; background: white; border-radius: 8px; padding: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <h2>TCO Comparison: ServiceNow vs Atlassian vs Custom Build (5-Year Period)</h2>
    <p class="subtitle">Stacked bars show annual cost breakdown; lines show cumulative TCO. Toggle cost components below.</p>
    <div class="controls">
        <strong>Show/Hide:</strong>
        <label><input type="checkbox" id="chk-licenses" checked> Licenses/Subscriptions</label>
        <label><input type="checkbox" id="chk-infra" checked> Infrastructure</label>
        <label><input type="checkbox" id="chk-personnel" checked> Personnel</label>
        <label><input type="checkbox" id="chk-impl" checked> Implementation/Enhancement</label>
        <label><input type="checkbox" id="chk-training" checked> Training &amp; Support</label>
    </div>
    <div class="chart-container">
        <canvas id="tcoChart"></canvas>
    </div>
    <script src="tco-comparison-chart-three-options-over-five-years.js"></script>
</body>
</html>
